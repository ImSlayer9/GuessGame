<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess the Number</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  background:#000;
  color:#fff;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:360px;
  padding:25px;
  border-radius:12px;
  background:#111;
  border:1px solid #333;
  text-align:center;
}

h1{margin-bottom:10px;}

.display{
  padding:15px;
  border-radius:8px;
  background:#000;
  border:1px solid #333;
  margin-bottom:10px;
  font-size:22px;
}

/* Boxes */
.guesses, .chances{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.guess-box, .box{
  width:32px;height:32px;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  border:1px solid #333;
}

.guess-box.low{
  background:#001f3f;
  color:#00aaff;
}

.guess-box.high{
  background:#3f0000;
  color:#ff4d4d;
}

/* Keypad */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.key{
  padding:15px;
  border-radius:8px;
  background:#fff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* Bottom buttons FIXED */
.bottom-buttons{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.bottom-buttons button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#fff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* Message */
.message{
  margin-top:10px;
  min-height:30px;
  font-size:14px;
}

/* Popup */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.9);
}

.popup-box{
  background:#111;
  padding:25px;
  border-radius:14px;
  width:280px;
  text-align:center;
  border:1px solid #444;
}

.popup-box h2{
  margin-bottom:15px;
  line-height:1.4;
}

.popup-buttons{
  display:flex;
  gap:10px;
}

.popup-buttons button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#fff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>Guess the Number</h1>

  <div class="display" id="display">Enter (1-99)</div>

  <div class="guesses" id="guesses"></div>
  <div class="chances" id="chances"></div>

  <div class="message" id="message"></div>

  <div class="keypad">
    <div class="key" onclick="add('1')">1</div>
    <div class="key" onclick="add('2')">2</div>
    <div class="key" onclick="add('3')">3</div>
    <div class="key" onclick="add('4')">4</div>
    <div class="key" onclick="add('5')">5</div>
    <div class="key" onclick="add('6')">6</div>
    <div class="key" onclick="add('7')">7</div>
    <div class="key" onclick="add('8')">8</div>
    <div class="key" onclick="add('9')">9</div>
    <div class="key" onclick="showResult()">RESULT</div>
    <div class="key" onclick="add('0')">0</div>
    <div class="key" onclick="checkGuess()">✔</div>
  </div>

  <div class="bottom-buttons">
    <button onclick="clearInput()">Clear</button>
    <button onclick="resetGame()">Reset</button>
  </div>
</div>

<!-- Popup -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h2 id="popupText"></h2>
    <div class="popup-buttons">
      <button onclick="closePopup()">OK</button>
      <button onclick="playAgain()">Play Again</button>
    </div>
  </div>
</div>

<script>
let number=Math.floor(Math.random()*99)+1;
let input="";
let attempts=0;
let max=7;

/* Create boxes */
for(let i=0;i<max;i++){
  chances.innerHTML+=`<div class="box"></div>`;
  guesses.innerHTML+=`<div class="guess-box"></div>`;
}

function add(d){
  if(input.length<2){
    input+=d;
    updateDisplay();
  }
}

function clearInput(){
  input="";
  updateDisplay();
}

function updateDisplay(){
  display.innerText=input || "Enter (1-99)";
}

function checkGuess(){
  let val=parseInt(input);
  let boxes=document.querySelectorAll(".box");
  let guessBoxes=document.querySelectorAll(".guess-box");

  if(!val || val<1 || val>99){
    message.innerText="Enter valid number";
    return;
  }

  if(attempts>=max) return;

  guessBoxes[attempts].innerText=val;

  if(val===number){
    boxes[attempts].innerText="✅";
    attempts++;
    showWin();
    return;
  }else{
    boxes[attempts].innerText="❌";

    if(val<number){
      guessBoxes[attempts].classList.add("low");
      message.innerText="Too low";
    }else{
      guessBoxes[attempts].classList.add("high");
      message.innerText="Too high";
    }

    attempts++;
  }

  if(attempts===max){
    showLose();
  }

  clearInput();
}

function showResult(){
  popupText.innerHTML=`🤖 Answer is: <b>${number}</b>`;
  popup.style.display="flex";
}

function getRank(a){
  if(a===1) return "Psychic 🔮";
  if(a===2) return "Mind Reader 🧠";
  if(a===3) return "Sharp 🎯";
  if(a===4) return "Good 👍";
  if(a===5) return "Average 😐";
  if(a===6) return "Lucky 😅";
  return "Survivor 💀";
}

function showWin(){
  popupText.innerHTML=`🎉 You Won!<br><br><b>${getRank(attempts)}</b><br>Attempts: ${attempts}`;
  popup.style.display="flex";
}

function showLose(){
  popupText.innerHTML=`💀 Game Over<br><br>Number was: <b>${number}</b>`;
  popup.style.display="flex";
}

function closePopup(){
  popup.style.display="none";
}

function playAgain(){
  popup.style.display="none";
  resetGame();
}

function resetGame(){
  number=Math.floor(Math.random()*99)+1;
  input="";
  attempts=0;
  message.innerText="";
  document.querySelectorAll(".box").forEach(b=>b.innerText="");
  document.querySelectorAll(".guess-box").forEach(b=>{
    b.innerText="";
    b.classList.remove("low","high");
  });
  updateDisplay();
}
</script>

</body>
</html>
