<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troll Guess 😈</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  background:#000;
  overflow:hidden;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Canvas */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* Card */
.container{
  width:380px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  text-align:center;
  z-index:2;
}

/* Title */
h1{
  color:#fff;
  margin-bottom:15px;
}

/* Display */
.display{
  padding:18px;
  border-radius:12px;
  font-size:28px;
  background:#111;
  border:1px solid #333;
  color:#aaa;
  margin-bottom:10px;
}

/* Chances */
.chances{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.box{
  width:30px;
  height:30px;
  border-radius:8px;
  background:#111;
  border:1px solid #333;
}

.box.wrong{
  background:#ff0033;
  box-shadow:0 0 10px #ff0033;
}

.box.correct{
  background:#00ff99;
  box-shadow:0 0 10px #00ff99;
}

/* Buttons */
.btn{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  background:#fff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  transition:0.25s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px #fff;
}

/* Keypad */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:15px;
}

.key{
  padding:18px;
  border-radius:12px;
  background:#fff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  transition:0.25s;
}

.key:hover{
  transform:scale(1.1);
  box-shadow:0 0 10px #fff;
}

/* Message */
.message{
  margin-top:10px;
  min-height:40px;
  color:#ccc;
}

/* Popup */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.85);
}

.popup-box{
  background:#111;
  padding:25px;
  border-radius:15px;
}

/* Shake */
.shake{
  animation:shake 0.3s;
}
@keyframes shake{
  25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}
  75%{transform:translateX(-6px)}
}
</style>
</head>

<body>

<canvas id="trailCanvas"></canvas>

<div class="container" id="game">
  <h1>TROLL GUESS 😈</h1>

  <div class="display" id="display">TRY ME</div>

  <div class="chances">
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
  </div>

  <button class="btn" onclick="checkGuess()">TRY YOUR LUCK</button>
  <button class="btn" onclick="resetGame()">RAGE QUIT 😂</button>

  <div class="message" id="message"></div>

  <div class="keypad">
    <div class="key" onclick="add('1')">1</div>
    <div class="key" onclick="add('2')">2</div>
    <div class="key" onclick="add('3')">3</div>
    <div class="key" onclick="add('4')">4</div>
    <div class="key" onclick="add('5')">5</div>
    <div class="key" onclick="add('6')">6</div>
    <div class="key" onclick="add('7')">7</div>
    <div class="key" onclick="add('8')">8</div>
    <div class="key" onclick="add('9')">9</div>
    <div class="key" onclick="clearInput()">CLR</div>
    <div class="key" onclick="add('0')">0</div>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <h2 id="popupText"></h2>
    <button class="btn" onclick="closePopup()">OK</button>
  </div>
</div>

<audio id="laugh" src="https://www.soundjay.com/human/laugh-01.mp3"></audio>

<script>
/* Gradient Trail */
const canvas = document.getElementById("trailCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points=[];

document.addEventListener("mousemove",e=>{
  points.push({x:e.clientX,y:e.clientY,life:1});
  if(points.length>60)points.shift();
});

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.12)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.lineCap="round";

  for(let i=0;i<points.length-1;i++){
    let p1=points[i],p2=points[i+1];
    p1.life*=0.96;

    let g=ctx.createLinearGradient(p1.x,p1.y,p2.x,p2.y);
    g.addColorStop(0,`rgba(0,255,255,${p1.life})`);
    g.addColorStop(0.5,`rgba(180,0,255,${p1.life})`);
    g.addColorStop(1,`rgba(255,0,120,${p1.life})`);

    ctx.strokeStyle=g;
    ctx.lineWidth=6*p1.life;
    ctx.shadowBlur=18;
    ctx.shadowColor="rgba(255,0,200,0.8)";

    ctx.beginPath();
    ctx.moveTo(p1.x,p1.y);
    ctx.lineTo(p2.x,p2.y);
    ctx.stroke();
  }

  points=points.filter(p=>p.life>0.05);
  requestAnimationFrame(draw);
}
draw();

/* Game */
let number=Math.floor(Math.random()*99)+1;
let input="";
let chances=7;
let index=0;

function add(d){
  if(input.length<2){
    input+=d;
    update();
  }
}

function clearInput(){input="";update();}

function update(){
  document.getElementById("display").innerText=input||"TRY ME";
}

function checkGuess(){
  let n=parseInt(input);
  let msg=document.getElementById("message");
  let boxes=document.querySelectorAll(".box");

  if(!n||n<1||n>99){
    msg.innerText="Enter valid number 🤦";
    return;
  }

  chances--;

  if(n===number){
    boxes[index].classList.add("correct");
    showPopup("You won... somehow 😒");
    return;
  }

  boxes[index].classList.add("wrong");
  index++;

  msg.innerText = n<number
    ? "Too LOW 😂 go higher"
    : "Too HIGH 🤡 come down";

  document.getElementById("laugh").play();

  if(chances===0){
    showPopup("Game Over 🤡 Number was "+number);
  }

  input="";
  update();
}

function showPopup(text){
  document.getElementById("popupText").innerText=text;
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
  resetGame();
}

function resetGame(){
  number=Math.floor(Math.random()*99)+1;
  input="";
  chances=7;
  index=0;
  document.getElementById("message").innerText="";
  document.querySelectorAll(".box").forEach(b=>{
    b.classList.remove("wrong","correct");
  });
  update();
}
</script>

</body>
</html>
