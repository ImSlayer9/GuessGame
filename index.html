<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troll Guess 😈</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Birds */
.bird{
  position:absolute;
  font-size:24px;
  animation:fly linear infinite;
}
@keyframes fly{
  from{transform:translateX(-10vw)}
  to{transform:translateX(110vw)}
}

/* Dropping emoji */
.drop{
  position:absolute;
  font-size:20px;
  animation:fall 2s linear forwards;
}
@keyframes fall{
  to{transform:translateY(100vh); opacity:0;}
}

/* Card */
.container{
  width:360px;
  padding:20px;
  border-radius:15px;
  background:#111;
  text-align:center;
  z-index:2;
}

/* Display */
.display{
  padding:15px;
  border:1px solid #fff;
  margin-bottom:10px;
  font-size:24px;
}

/* Buttons */
button{
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#ff004c;
  color:white;
  border:none;
}

/* Keypad */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;
}

.key{
  padding:15px;
  background:#222;
}

/* Shake */
.shake{
  animation:shake 0.3s;
}
@keyframes shake{
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  75%{transform:translateX(-5px)}
}

/* Popup */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.8);
}
.popup-box{
  background:#111;
  padding:20px;
}
</style>
</head>

<body>

<!-- Birds -->
<div class="bird" style="top:10%;animation-duration:8s;">🐦</div>
<div class="bird" style="top:50%;animation-duration:12s;">🕊️</div>

<div class="container" id="game">
  <h2>TROLL GUESS 😈</h2>

  <div class="display" id="display">ENTER</div>

  <button onclick="checkGuess()">GUESS</button>
  <button onclick="resetGame()">RESET 😂</button>

  <div id="message"></div>

  <div class="keypad">
    <div class="key" onclick="add('1')">1</div>
    <div class="key" onclick="add('2')">2</div>
    <div class="key" onclick="add('3')">3</div>
    <div class="key" onclick="add('4')">4</div>
    <div class="key" onclick="add('5')">5</div>
    <div class="key" onclick="add('6')">6</div>
    <div class="key" onclick="add('7')">7</div>
    <div class="key" onclick="add('8')">8</div>
    <div class="key" onclick="add('9')">9</div>
    <div class="key" onclick="clearInput()">CLR</div>
    <div class="key" onclick="add('0')">0</div>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <h2 id="popupText"></h2>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<!-- Sound -->
<audio id="laugh" src="https://www.soundjay.com/human/laugh-01.mp3"></audio>

<script>
let number=Math.floor(Math.random()*99)+1;
let input="";
let chances=7;
let attempts=0;

function add(d){
  if(input.length<2){
    input+=d;
    update();
  }
}

function clearInput(){
  input="";
  update();
}

function update(){
  document.getElementById("display").innerText=input||"ENTER";
}

function dropEmoji(){
  let e=document.createElement("div");
  e.className="drop";
  e.style.left=Math.random()*100+"vw";
  e.innerText=Math.random()>0.5?"😂":"💩";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),2000);
}

function checkGuess(){
  let n=parseInt(input);
  let msg=document.getElementById("message");
  let game=document.getElementById("game");

  if(!n||n<1||n>99){
    msg.innerText="Enter valid number 🤦";
    return;
  }

  chances--;
  attempts++;

  if(n===number){
    showPopup("You won... somehow 😒");
    return;
  }

  // correct hint + troll
  if(n<number){
    msg.innerText="Too LOW 😂 try higher bro";
  }else{
    msg.innerText="Too HIGH 🤡 come down";
  }

  // laugh sound
  document.getElementById("laugh").play();

  // shake
  game.classList.add("shake");
  setTimeout(()=>game.classList.remove("shake"),300);

  // emoji rain
  for(let i=0;i<3;i++){
    setTimeout(dropEmoji, i*200);
  }

  if(chances===0){
    showPopup("Game Over 🤡 Number was "+number);
  }

  input="";
  update();
}

function showPopup(text){
  document.getElementById("popupText").innerText=text;
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
  resetGame();
}

function resetGame(){
  number=Math.floor(Math.random()*99)+1;
  input="";
  chances=7;
  attempts=0;
  document.getElementById("message").innerText="";
  update();
}

update();
</script>

</body>
</html>
