<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troll Guess 😈</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  background:#000;
  overflow:hidden;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Canvas */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* Glass Card */
.container{
  width:380px;
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 40px rgba(255,255,255,0.08);
  text-align:center;
  z-index:2;
}

/* Title */
h1{
  color:#fff;
  margin-bottom:15px;
  letter-spacing:1px;
}

/* Display */
.display{
  padding:18px;
  border-radius:12px;
  font-size:28px;
  background:#111;
  margin-bottom:12px;
  border:1px solid #333;
  color:#fff;
}

/* Buttons */
.btn{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  background:#1f1f1f;
  color:#fff;
  cursor:pointer;
  transition:0.25s;
}
.btn:hover{
  background:#fff;
  color:#000;
  transform:scale(1.03);
}

/* Keypad */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:15px;
}

.key{
  padding:18px;
  border-radius:15px;
  font-size:18px;
  background:#111;
  border:1px solid #333;
  cursor:pointer;
  transition:0.25s;
}

.key:hover{
  background:#fff;
  color:#000;
  transform:scale(1.1);
  box-shadow:0 0 10px rgba(255,255,255,0.4);
}

/* Message */
.message{
  margin-top:10px;
  min-height:40px;
  color:#ccc;
}

/* Popup */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.85);
  z-index:5;
}

.popup-box{
  background:#111;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

/* Shake */
.shake{
  animation:shake 0.3s;
}
@keyframes shake{
  25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}
  75%{transform:translateX(-6px)}
}
</style>
</head>

<body>

<canvas id="trailCanvas"></canvas>

<div class="container" id="game">
  <h1>TROLL GUESS 😈</h1>

  <div class="display" id="display">ENTER NUMBER</div>

  <button class="btn" onclick="checkGuess()">TRY YOUR LUCK</button>
  <button class="btn" onclick="resetGame()">RAGE QUIT 😂</button>

  <div class="message" id="message"></div>

  <div class="keypad">
    <div class="key" onclick="add('1')">1</div>
    <div class="key" onclick="add('2')">2</div>
    <div class="key" onclick="add('3')">3</div>
    <div class="key" onclick="add('4')">4</div>
    <div class="key" onclick="add('5')">5</div>
    <div class="key" onclick="add('6')">6</div>
    <div class="key" onclick="add('7')">7</div>
    <div class="key" onclick="add('8')">8</div>
    <div class="key" onclick="add('9')">9</div>
    <div class="key" onclick="clearInput()">CLR</div>
    <div class="key" onclick="add('0')">0</div>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <h2 id="popupText"></h2>
    <button class="btn" onclick="closePopup()">OK</button>
  </div>
</div>

<audio id="laugh" src="https://www.soundjay.com/human/laugh-01.mp3"></audio>

<script>
/* ===== PREMIUM GRADIENT GLOW TRAIL ===== */
const canvas = document.getElementById("trailCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];

document.addEventListener("mousemove", (e) => {
  points.push({ x: e.clientX, y: e.clientY, life: 1 });
  if (points.length > 60) points.shift();
});

function drawTrail() {
  ctx.fillStyle = "rgba(0,0,0,0.12)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  for (let i = 0; i < points.length - 1; i++) {
    let p1 = points[i];
    let p2 = points[i + 1];

    p1.life *= 0.96;
    let alpha = p1.life;

    let gradient = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
    gradient.addColorStop(0, `rgba(0,255,255,${alpha})`);
    gradient.addColorStop(0.5, `rgba(180,0,255,${alpha})`);
    gradient.addColorStop(1, `rgba(255,0,120,${alpha})`);

    ctx.beginPath();
    ctx.strokeStyle = gradient;

    ctx.shadowBlur = 18;
    ctx.shadowColor = "rgba(255,0,200,0.8)";

    ctx.lineWidth = 6 * alpha;

    let midX = (p1.x + p2.x) / 2;
    let midY = (p1.y + p2.y) / 2;

    ctx.moveTo(p1.x, p1.y);
    ctx.quadraticCurveTo(p1.x, p1.y, midX, midY);
    ctx.stroke();
  }

  points = points.filter(p => p.life > 0.05);
  requestAnimationFrame(drawTrail);
}

drawTrail();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

/* ===== GAME LOGIC ===== */
let number=Math.floor(Math.random()*99)+1;
let input="";
let chances=7;

function add(d){
  if(input.length<2){
    input+=d;
    update();
  }
}

function clearInput(){
  input="";
  update();
}

function update(){
  document.getElementById("display").innerText=input||"TRY ME";
}

function checkGuess(){
  let n=parseInt(input);
  let msg=document.getElementById("message");
  let game=document.getElementById("game");

  if(!n||n<1||n>99){
    msg.innerText="Enter valid number 🤦";
    return;
  }

  chances--;

  if(n===number){
    showPopup("You won... somehow 😒");
    return;
  }

  msg.innerText = n<number
    ? "Too LOW 😂 go higher"
    : "Too HIGH 🤡 come down";

  document.getElementById("laugh").play();

  game.classList.add("shake");
  setTimeout(()=>game.classList.remove("shake"),300);

  if(chances===0){
    showPopup("Game Over 🤡 Number was "+number);
  }

  input="";
  update();
}

function showPopup(text){
  document.getElementById("popupText").innerText=text;
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
  resetGame();
}

function resetGame(){
  number=Math.floor(Math.random()*99)+1;
  input="";
  chances=7;
  document.getElementById("message").innerText="";
  update();
}

update();
</script>

</body>
</html>
