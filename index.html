<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess The Number</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Courier New",monospace}

body{
height:100vh;display:flex;justify-content:center;align-items:center;
background:#000;color:#00ff9c;
overflow:hidden;
}

/* subtle scanline effect */
body::before{
content:"";position:absolute;width:100%;height:100%;
background:repeating-linear-gradient(
  to bottom,
  rgba(0,255,0,0.05),
  rgba(0,255,0,0.05) 1px,
  transparent 1px,
  transparent 3px
);
pointer-events:none;
}

.container{
background:#020202;padding:25px;border-radius:10px;width:95%;max-width:400px;
text-align:center;border:1px solid #00ff9c;
box-shadow:0 0 20px #00ff9c;
}

h1{margin-bottom:10px;font-size:22px;text-shadow:0 0 8px #00ff9c}
p{margin-bottom:15px;color:#00cc7a}

input{
width:100%;padding:12px;margin-bottom:10px;border-radius:6px;
border:1px solid #00ff9c;font-size:20px;text-align:center;
background:#000;color:#00ff9c;
box-shadow:0 0 10px #00ff9c inset;
}

button{border:none;border-radius:6px;cursor:pointer;transition:.2s;font-family:inherit}

.submit-btn{
width:100%;padding:10px;background:#001a0f;color:#00ff9c;font-size:14px;margin-bottom:10px;
border:1px solid #00ff9c;box-shadow:0 0 10px #00ff9c;
}
.submit-btn:hover{background:#003322}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}

.key{
padding:12px;font-size:16px;background:#000;color:#00ff9c;
border:1px solid #00ff9c;border-radius:6px;
}

.key:hover{background:#002b1a}
.key:active{transform:scale(.9)}

.wide{grid-column:span 2}

.chance-boxes{display:flex;justify-content:space-between;margin-top:15px}

.box{
width:32px;height:32px;border-radius:4px;background:#000;
display:flex;justify-content:center;align-items:center;
font-weight:bold;font-size:14px;
border:1px solid #00ff9c;
}

.box.active{box-shadow:0 0 10px #00ff9c}
.box.wrong{background:#330000;color:#ff4d4d}
.box.correct{background:#003322;color:#00ff9c}

.message{margin-top:12px;font-weight:bold;font-size:14px}
.hint{font-size:22px;font-weight:900;animation:blink .5s alternate infinite}

@keyframes blink{from{opacity:.5}to{opacity:1}}

.success{color:#00ff9c}
.error{color:#ff4d4d}

.modal{
position:fixed;inset:0;display:flex;justify-content:center;align-items:center;
background:rgba(0,0,0,.9);opacity:0;pointer-events:none;transition:.2s
}

.modal.show{opacity:1;pointer-events:auto}

.modal-content{
background:#000;padding:20px;border-radius:10px;text-align:center;
border:1px solid #00ff9c;box-shadow:0 0 20px #00ff9c;
animation:scaleIn .3s
}

@keyframes scaleIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}

.close-btn{
padding:8px 16px;background:#001a0f;border:1px solid #00ff9c;color:#00ff9c;
}

.play-again-btn{
margin-top:15px;width:100%;padding:12px;font-size:16px;
color:#000;background:#00ff9c;border-radius:6px;font-weight:bold;
box-shadow:0 0 15px #00ff9c;
}

.play-again-btn:hover{background:#00cc7a}

</style>
</head>
<body>
<div class="container">
<h1>🧠 SYSTEM BREACH: GUESS PROTOCOL</h1>
<p>Enter value between 1 - 99</p>
<input id="guessInput" placeholder="INPUT VALUE" readonly>
<button class="submit-btn" id="submitBtn">EXECUTE</button>
<button class="submit-btn" id="resetBtn">RESET SYSTEM</button>

<div class="keypad" id="keypad">
<button class="key">1</button><button class="key">2</button><button class="key">3</button>
<button class="key">4</button><button class="key">5</button><button class="key">6</button>
<button class="key">7</button><button class="key">8</button><button class="key">9</button>
<button class="key wide" data-action="clear">CLR</button>
<button class="key">0</button>
</div>

<div class="chance-boxes" id="boxes">
<div class="box active"></div><div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
</div>

<div class="message" id="message"></div>
<button id="restartBtn" class="play-again-btn" style="display:none">RESTART MISSION</button>
</div>

<div class="modal" id="modal"><div class="modal-content"><h2>ACCESS RESULT</h2><p id="rankText"></p><button class="close-btn" id="closeModal">CLOSE</button></div></div>

<script>
const input = document.getElementById('guessInput');
const message = document.getElementById('message');
const restartBtn = document.getElementById('restartBtn');
const keypad = document.getElementById('keypad');
const boxes = Array.from(document.querySelectorAll('.box'));
const modal = document.getElementById('modal');
const rankText = document.getElementById('rankText');

let guessNumber = rand();
let chances = 7, idx = 0, gameOver = false;

function rand(){ return Math.floor(Math.random()*99)+1 }

keypad.addEventListener('click', e=>{
  if(gameOver) return;
  const t = e.target;
  if(!t.classList.contains('key')) return;
  if(t.dataset.action==='clear'){ input.value=''; return; }
  if(input.value.length<2) input.value += t.textContent;
});

document.getElementById('submitBtn').onclick = checkGuess;
document.getElementById('resetBtn').onclick = restartGame;
restartBtn.onclick = restartGame;
document.getElementById('closeModal').onclick = ()=> modal.classList.remove('show');

function setActive(){ boxes.forEach(b=>b.classList.remove('active')); if(idx<boxes.length) boxes[idx].classList.add('active'); }

function mark(type){ const b = boxes[idx]; b.classList.add(type); b.textContent = type==='wrong'?'✖':'✔'; idx++; setActive(); }

function disableKeypad(){ keypad.style.pointerEvents='none'; keypad.style.opacity='.4'; }

function showRank(attempts){
  let msg = attempts===1 ? "⚡ FLASH ACCESS" : attempts<=3 ? "🧠 HIGH INTEL" : attempts<=5 ? "🐢 SLOW RESPONSE" : "💀 SYSTEM FAILURE";
  rankText.textContent = `${msg} (${attempts} attempts)`;
  modal.classList.add('show');
}

function checkGuess(){
  if(gameOver) return;
  const n = Number(input.value);
  if(!n || n<1 || n>99){ message.textContent='INVALID INPUT'; message.className='message error'; return; }
  chances--;
  if(n===guessNumber){
    mark('correct');
    message.textContent='ACCESS GRANTED'; message.className='message success';
    gameOver=true; restartBtn.style.display='block'; disableKeypad(); showRank(idx);
  }else{
    mark('wrong');
    if(n<guessNumber){
  message.textContent='[ SYSTEM ] >> VALUE TOO LOW... INCREASE INPUT';
}else{
  message.textContent='[ SYSTEM ] >> VALUE TOO HIGH... DECREASE INPUT';
}
    message.className='message error hint';
  }
  if(chances===0 && n!==guessNumber){
    message.textContent=`ACCESS DENIED (${guessNumber})`;
    gameOver=true; restartBtn.style.display='block'; disableKeypad();
  }
  input.value='';
}

function restartGame(){
  guessNumber = rand(); chances=7; idx=0; gameOver=false;
  boxes.forEach((b,i)=>{ b.className='box'; b.textContent=''; if(i===0) b.classList.add('active'); });
  message.textContent=''; restartBtn.style.display='none'; input.value='';
  keypad.style.pointerEvents='auto'; keypad.style.opacity='1'; modal.classList.remove('show');
}
</script>
</body>
</html>
