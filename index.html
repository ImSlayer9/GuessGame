<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troll Guess 😈</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  height:100vh;
  background:radial-gradient(circle at top,#1a1a1a,#000);
  color:white;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ===== Floating Birds ===== */
.bird{
  position:absolute;
  font-size:24px;
  opacity:0.7;
  animation:flyRight linear infinite;
}

.bird.reverse{
  animation:flyLeft linear infinite;
}

@keyframes flyRight{
  from{transform:translateX(-10vw)}
  to{transform:translateX(110vw)}
}

@keyframes flyLeft{
  from{transform:translateX(110vw)}
  to{transform:translateX(-10vw)}
}

/* ===== Main Card ===== */
.container{
  width:380px;
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 40px rgba(255,0,80,0.2);
  text-align:center;
  z-index:2;
}

/* Title */
h1{
  font-size:26px;
  color:#ff4d6d;
  margin-bottom:15px;
  letter-spacing:1px;
}

/* Display */
.display{
  padding:18px;
  border-radius:12px;
  font-size:28px;
  margin-bottom:12px;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(255,77,109,0.5);
}

/* Buttons */
.btn{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  background:linear-gradient(45deg,#ff4d6d,#ff1e4d);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 15px #ff4d6d;
}

/* Keypad */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:15px;
}

.key{
  padding:15px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
  transition:0.2s;
}

.key:hover{
  background:#ff4d6d;
}

/* Message */
.message{
  margin-top:12px;
  min-height:40px;
  font-size:14px;
  color:#ffb3c1;
}

/* Popup */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.8);
  z-index:5;
}

.popup-box{
  background:#111;
  padding:30px;
  border-radius:15px;
  text-align:center;
  animation:pop 0.3s ease;
}

@keyframes pop{
  from{transform:scale(0.7);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* Shake */
.shake{
  animation:shake 0.3s;
}

@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}
  75%{transform:translateX(-6px)}
  100%{transform:translateX(0)}
}
</style>
</head>

<body>

<!-- Birds -->
<div class="bird" style="top:10%; animation-duration:8s;">🐦</div>
<div class="bird reverse" style="top:20%; animation-duration:10s;">🕊️</div>
<div class="bird" style="top:70%; animation-duration:12s;">🐦</div>
<div class="bird reverse" style="top:50%; animation-duration:9s;">🕊️</div>

<div class="container" id="game">
  <h1>TROLL GUESS 😈</h1>

  <div class="display" id="display">ENTER NUMBER</div>

  <button class="btn" onclick="checkGuess()">TRY YOUR LUCK</button>
  <button class="btn" onclick="resetGame()">RAGE QUIT 😂</button>

  <div class="message" id="message"></div>

  <div class="keypad">
    <div class="key" onclick="addDigit('1')">1</div>
    <div class="key" onclick="addDigit('2')">2</div>
    <div class="key" onclick="addDigit('3')">3</div>
    <div class="key" onclick="addDigit('4')">4</div>
    <div class="key" onclick="addDigit('5')">5</div>
    <div class="key" onclick="addDigit('6')">6</div>
    <div class="key" onclick="addDigit('7')">7</div>
    <div class="key" onclick="addDigit('8')">8</div>
    <div class="key" onclick="addDigit('9')">9</div>
    <div class="key" onclick="clearInput()">CLR</div>
    <div class="key" onclick="addDigit('0')">0</div>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <h2 id="popupText"></h2><br>
    <button class="btn" onclick="closePopup()">OK 😭</button>
  </div>
</div>

<script>
let number=Math.floor(Math.random()*99)+1;
let input="";
let chances=7;
let attempts=0;

const trollLow=[
"Bro… even birds guess better 💀",
"Too low… like your confidence 😂",
"Are you even trying?"
];

const trollHigh=[
"Too high genius 🤡",
"Trying to reach Mars? 🚀",
"Calm down bro"
];

const fakeHints=[
"You’re close… or am I lying 😏",
"That felt right… but nope 😂",
"Almost… just kidding 🤡"
];

function updateDisplay(){
  document.getElementById("display").innerText=input||"ENTER NUMBER";
}

function addDigit(d){
  if(input.length<2){
    input+=d;
    updateDisplay();
  }
}

function clearInput(){
  input="";
  updateDisplay();
}

function checkGuess(){
  let msg=document.getElementById("message");
  let game=document.getElementById("game");

  let n=parseInt(input);

  if(!n||n<1||n>99){
    msg.innerText="Enter valid number bro 🤦";
    return;
  }

  chances--;
  attempts++;

  if(n===number){
    showPopup(winMessage());
    return;
  }

  game.classList.add("shake");
  setTimeout(()=>game.classList.remove("shake"),300);

  if(Math.random()<0.3){
    msg.innerText=fakeHints[Math.floor(Math.random()*fakeHints.length)];
  }else{
    msg.innerText=n<number
      ? trollLow[Math.floor(Math.random()*trollLow.length)]
      : trollHigh[Math.floor(Math.random()*trollHigh.length)];
  }

  if(chances===0){
    showPopup("Game Over 🤡 Number was "+number);
  }

  input="";
  updateDisplay();
}

function winMessage(){
  if(attempts===1) return "Okay relax Einstein ⚡";
  if(attempts<=3) return "Lucky or smart? 🤔";
  if(attempts<=5) return "Finally… took forever 🚶";
  return "Barely survived 💀";
}

function showPopup(text){
  document.getElementById("popupText").innerText=text;
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
  resetGame();
}

function resetGame(){
  number=Math.floor(Math.random()*99)+1;
  input="";
  chances=7;
  attempts=0;
  document.getElementById("message").innerText="";
  updateDisplay();
}

updateDisplay();
</script>

</body>
</html>
