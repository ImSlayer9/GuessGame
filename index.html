<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troll Guess 😈</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  height:100vh;
  background:linear-gradient(135deg,#1a1a1a,#000);
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Glass Card */
.container{
  width:380px;
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 40px rgba(255,0,80,0.2);
  text-align:center;
  z-index:2;
}

/* Title */
h1{
  color:#ff4d6d;
  margin-bottom:15px;
}

/* Display */
.display{
  padding:18px;
  border-radius:12px;
  font-size:28px;
  background:rgba(0,0,0,0.6);
  margin-bottom:12px;
}

/* Buttons */
.btn{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#ff4d6d,#ff1e4d);
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover{
  transform:scale(1.05);
}

/* Keypad */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:15px;
}

.key{
  padding:18px;
  border-radius:15px;
  font-size:18px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
  transition:0.3s;
}

.key:hover{
  background:#ff4d6d;
  transform:scale(1.1);
  box-shadow:0 0 10px #ff4d6d;
}

/* Message */
.message{
  margin-top:10px;
  min-height:40px;
  color:#ffb3c1;
}

/* Popup */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.8);
}

.popup-box{
  background:#111;
  padding:25px;
  border-radius:15px;
}

/* Mouse Trail */
.trail{
  position:absolute;
  width:10px;
  height:10px;
  background:#ff4d6d;
  border-radius:50%;
  pointer-events:none;
  animation:fade 0.6s linear forwards;
}

@keyframes fade{
  to{opacity:0; transform:scale(2);}
}

/* Shake */
.shake{
  animation:shake 0.3s;
}
@keyframes shake{
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  75%{transform:translateX(-5px)}
}
</style>
</head>

<body>

<div class="container" id="game">
  <h1>TROLL GUESS 😈</h1>

  <div class="display" id="display">ENTER NUMBER</div>

  <button class="btn" onclick="checkGuess()">TRY YOUR LUCK</button>
  <button class="btn" onclick="resetGame()">RAGE QUIT 😂</button>

  <div class="message" id="message"></div>

  <div class="keypad">
    <div class="key" onclick="add('1')">1</div>
    <div class="key" onclick="add('2')">2</div>
    <div class="key" onclick="add('3')">3</div>
    <div class="key" onclick="add('4')">4</div>
    <div class="key" onclick="add('5')">5</div>
    <div class="key" onclick="add('6')">6</div>
    <div class="key" onclick="add('7')">7</div>
    <div class="key" onclick="add('8')">8</div>
    <div class="key" onclick="add('9')">9</div>
    <div class="key" onclick="clearInput()">CLR</div>
    <div class="key" onclick="add('0')">0</div>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <h2 id="popupText"></h2>
    <button class="btn" onclick="closePopup()">OK</button>
  </div>
</div>

<audio id="laugh" src="https://www.soundjay.com/human/laugh-01.mp3"></audio>

<script>
let number=Math.floor(Math.random()*99)+1;
let input="";
let chances=7;
let attempts=0;

/* Mouse Trail Effect */
document.addEventListener("mousemove",e=>{
  let t=document.createElement("div");
  t.className="trail";
  t.style.left=e.pageX+"px";
  t.style.top=e.pageY+"px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),600);
});

function add(d){
  if(input.length<2){
    input+=d;
    update();
  }
}

function clearInput(){
  input="";
  update();
}

function update(){
  document.getElementById("display").innerText=input||"ENTER NUMBER";
}

function checkGuess(){
  let n=parseInt(input);
  let msg=document.getElementById("message");
  let game=document.getElementById("game");

  if(!n||n<1||n>99){
    msg.innerText="Enter valid number 🤦";
    return;
  }

  chances--;
  attempts++;

  if(n===number){
    showPopup("You won... somehow 😒");
    return;
  }

  if(n<number){
    msg.innerText="Too LOW 😂 try higher bro";
  }else{
    msg.innerText="Too HIGH 🤡 come down";
  }

  document.getElementById("laugh").play();

  game.classList.add("shake");
  setTimeout(()=>game.classList.remove("shake"),300);

  if(chances===0){
    showPopup("Game Over 🤡 Number was "+number);
  }

  input="";
  update();
}

function showPopup(text){
  document.getElementById("popupText").innerText=text;
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
  resetGame();
}

function resetGame(){
  number=Math.floor(Math.random()*99)+1;
  input="";
  chances=7;
  attempts=0;
  document.getElementById("message").innerText="";
  update();
}

update();
</script>

</body>
</html>
