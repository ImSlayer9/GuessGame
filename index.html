<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Guess the Number</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

:root {
  --bg: #060816;
  --card: rgba(15, 23, 42, 0.78);
  --card-border: rgba(148, 163, 184, 0.28);
  --text: #f8fafc;
  --muted: #94a3b8;
  --cyan: #22d3ee;
  --blue: #3b82f6;
  --purple: #a855f7;
  --pink: #ec4899;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #facc15;
}

body {
  min-height: 100vh;
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background:
    radial-gradient(circle at top left, rgba(34, 211, 238, 0.2), transparent 28%),
    radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.25), transparent 30%),
    linear-gradient(135deg, #020617, #111827 55%, #020617);
}

body::before,
body::after {
  content: "";
  position: fixed;
  width: 420px;
  height: 420px;
  border-radius: 50%;
  filter: blur(30px);
  opacity: 0.35;
  animation: floatBlob 8s ease-in-out infinite alternate;
  z-index: -2;
}

body::before {
  background: var(--cyan);
  top: -120px;
  left: -90px;
}

body::after {
  background: var(--purple);
  right: -120px;
  bottom: -110px;
  animation-delay: 1s;
}

.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 42px 42px;
  mask-image: radial-gradient(circle, black 45%, transparent 75%);
  z-index: -1;
}

.container {
  width: min(92vw, 410px);
  padding: 26px;
  border-radius: 28px;
  background: var(--card);
  border: 1px solid var(--card-border);
  text-align: center;
  backdrop-filter: blur(22px);
  box-shadow:
    0 24px 80px rgba(0, 0, 0, 0.55),
    inset 0 1px 0 rgba(255, 255, 255, 0.08);
  position: relative;
  animation: cardIn 650ms ease both;
}

.container::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: 28px;
  padding: 1px;
  background: linear-gradient(135deg, var(--cyan), transparent, var(--purple));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  border: 1px solid rgba(34, 211, 238, 0.35);
  border-radius: 999px;
  color: var(--cyan);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: rgba(34, 211, 238, 0.08);
  margin-bottom: 14px;
}

h1 {
  font-size: 31px;
  line-height: 1.05;
  margin-bottom: 8px;
  background: linear-gradient(90deg, #fff, var(--cyan), var(--purple));
  -webkit-background-clip: text;
  color: transparent;
}

.subtitle {
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 18px;
}

.display {
  padding: 18px;
  border-radius: 18px;
  background: rgba(2, 6, 23, 0.82);
  border: 1px solid rgba(148, 163, 184, 0.22);
  margin-bottom: 14px;
  font-size: 27px;
  font-weight: 800;
  letter-spacing: 0.08em;
  box-shadow: inset 0 0 30px rgba(34, 211, 238, 0.07);
  transition: transform 0.2s ease, border 0.2s ease;
}

.display.active {
  border-color: rgba(34, 211, 238, 0.7);
  transform: scale(1.025);
}

.status-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 2px 8px;
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.guesses,
.chances {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-bottom: 9px;
}

.guess-box,
.box {
  height: 36px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 800;
  border: 1px solid rgba(148, 163, 184, 0.2);
  background: rgba(15, 23, 42, 0.78);
  transition: all 0.25s ease;
}

.guess-box.low {
  background: rgba(59, 130, 246, 0.16);
  color: #60a5fa;
  border-color: rgba(59, 130, 246, 0.55);
  box-shadow: 0 0 18px rgba(59, 130, 246, 0.14);
  animation: pop 280ms ease both;
}

.guess-box.high {
  background: rgba(239, 68, 68, 0.16);
  color: #f87171;
  border-color: rgba(239, 68, 68, 0.55);
  box-shadow: 0 0 18px rgba(239, 68, 68, 0.14);
  animation: pop 280ms ease both;
}

.box.success {
  background: rgba(34, 197, 94, 0.18);
  border-color: rgba(34, 197, 94, 0.55);
  animation: pop 300ms ease both;
}

.box.fail {
  background: rgba(239, 68, 68, 0.14);
  border-color: rgba(239, 68, 68, 0.45);
  animation: shake 260ms ease both;
}

.message {
  margin-top: 10px;
  min-height: 34px;
  font-size: 14px;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
}

.message.warn { color: var(--yellow); }
.message.low { color: #60a5fa; }
.message.high { color: #f87171; }
.message.win { color: #4ade80; }

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 11px;
  margin-top: 12px;
}

.key,
.bottom-buttons button,
.popup-buttons button {
  border: 0;
  border-radius: 16px;
  font-weight: 900;
  cursor: pointer;
  color: var(--text);
  background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 10px 24px rgba(0,0,0,0.25);
  transition: transform 0.16s ease, box-shadow 0.16s ease, border 0.16s ease;
  user-select: none;
}

.key {
  padding: 16px 10px;
  font-size: 16px;
}

.key:hover,
.bottom-buttons button:hover,
.popup-buttons button:hover {
  transform: translateY(-3px);
  border-color: rgba(34, 211, 238, 0.45);
  box-shadow: 0 14px 30px rgba(34, 211, 238, 0.14);
}

.key:active,
.bottom-buttons button:active,
.popup-buttons button:active {
  transform: translateY(1px) scale(0.98);
}

.key.action {
  background: linear-gradient(135deg, rgba(168, 85, 247, 0.9), rgba(34, 211, 238, 0.7));
}

.key.check {
  background: linear-gradient(135deg, rgba(34, 197, 94, 0.9), rgba(34, 211, 238, 0.65));
}

.bottom-buttons {
  display: flex;
  gap: 12px;
  margin-top: 12px;
}

.bottom-buttons button {
  flex: 1;
  padding: 12px;
}

.bottom-buttons button:first-child {
  color: #facc15;
}

.bottom-buttons button:last-child {
  color: #f87171;
}

.popup {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(2, 6, 23, 0.78);
  backdrop-filter: blur(14px);
  z-index: 10;
}

.popup.show {
  display: flex;
}

.popup-box {
  background: rgba(15, 23, 42, 0.95);
  padding: 28px;
  border-radius: 26px;
  width: min(88vw, 330px);
  text-align: center;
  border: 1px solid rgba(148, 163, 184, 0.25);
  box-shadow: 0 30px 90px rgba(0,0,0,0.65);
  animation: popupIn 350ms cubic-bezier(.2,.9,.2,1.25) both;
}

.popup-box h2 {
  margin-bottom: 18px;
  line-height: 1.45;
  font-size: 24px;
}

.popup-box b {
  color: var(--cyan);
}

.popup-buttons {
  display: flex;
  gap: 12px;
}

.popup-buttons button {
  flex: 1;
  padding: 12px;
}

.confetti {
  pointer-events: none;
  position: fixed;
  width: 8px;
  height: 14px;
  top: -20px;
  animation: fall 1.8s linear forwards;
  z-index: 20;
}

.shake-screen {
  animation: shake 300ms ease both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(24px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes popupIn {
  from { opacity: 0; transform: translateY(18px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes floatBlob {
  from { transform: translate(0, 0) scale(1); }
  to { transform: translate(35px, 28px) scale(1.08); }
}

@keyframes pop {
  0% { transform: scale(0.7); opacity: 0.4; }
  70% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-4px); }
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(720deg);
    opacity: 0;
  }
}

@media (max-width: 420px) {
  .container { padding: 22px; border-radius: 24px; }
  h1 { font-size: 27px; }
  .display { font-size: 24px; }
  .key { padding: 14px 8px; }
}
</style>
</head>

<body>
<div class="bg-grid"></div>

<div class="container" id="gameCard">
  <div class="badge">⚡ Neon Guess Arena</div>
  <h1>Guess the Number</h1>
  <p class="subtitle">Find the secret number between 1 and 99</p>

  <div class="display" id="display">Enter (1-99)</div>

  <div class="status-row">
    <span>Your guesses</span>
    <span>7 tries</span>
  </div>

  <div class="guesses" id="guesses"></div>
  <div class="chances" id="chances"></div>

  <div class="message" id="message">Start guessing. The machine is waiting 🤖</div>

  <div class="keypad">
    <div class="key" onclick="add('1')">1</div>
    <div class="key" onclick="add('2')">2</div>
    <div class="key" onclick="add('3')">3</div>
    <div class="key" onclick="add('4')">4</div>
    <div class="key" onclick="add('5')">5</div>
    <div class="key" onclick="add('6')">6</div>
    <div class="key" onclick="add('7')">7</div>
    <div class="key" onclick="add('8')">8</div>
    <div class="key" onclick="add('9')">9</div>
    <div class="key action" onclick="showResult()">RESULT</div>
    <div class="key" onclick="add('0')">0</div>
    <div class="key check" onclick="checkGuess()">✔</div>
  </div>

  <div class="bottom-buttons">
    <button onclick="clearInput()">Clear</button>
    <button onclick="resetGame()">Reset</button>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <h2 id="popupText"></h2>
    <div class="popup-buttons">
      <button onclick="closePopup()">OK</button>
      <button onclick="playAgain()">Play Again</button>
    </div>
  </div>
</div>

<script>
let number = Math.floor(Math.random() * 99) + 1;
let input = "";
let attempts = 0;
let max = 7;

for (let i = 0; i < max; i++) {
  chances.innerHTML += `<div class="box"></div>`;
  guesses.innerHTML += `<div class="guess-box"></div>`;
}

function add(d) {
  if (input.length < 2) {
    input += d;
    updateDisplay();
    pulseDisplay();
  }
}

function clearInput() {
  input = "";
  updateDisplay();
}

function updateDisplay() {
  display.innerText = input || "Enter (1-99)";
}

function pulseDisplay() {
  display.classList.add("active");
  setTimeout(() => display.classList.remove("active"), 180);
}

function setMessage(text, type = "") {
  message.className = `message ${type}`;
  message.innerText = text;
}

function checkGuess() {
  let val = parseInt(input);
  let boxes = document.querySelectorAll(".box");
  let guessBoxes = document.querySelectorAll(".guess-box");

  if (!val || val < 1 || val > 99) {
    setMessage("Enter a valid number from 1 to 99 ⚠️", "warn");
    gameCard.classList.add("shake-screen");
    setTimeout(() => gameCard.classList.remove("shake-screen"), 320);
    return;
  }

  if (attempts >= max) return;

  guessBoxes[attempts].innerText = val;

  if (val === number) {
    boxes[attempts].innerText = "✅";
    boxes[attempts].classList.add("success");
    attempts++;
    setMessage("Perfect hit. You cracked it! 🎯", "win");
    launchConfetti();
    showWin();
    return;
  } else {
    boxes[attempts].innerText = "❌";
    boxes[attempts].classList.add("fail");

    if (val < number) {
      guessBoxes[attempts].classList.add("low");
      setMessage("Too low. Aim higher ⬆️", "low");
    } else {
      guessBoxes[attempts].classList.add("high");
      setMessage("Too high. Drop lower ⬇️", "high");
    }

    attempts++;
  }

  if (attempts === max) {
    showLose();
  }

  clearInput();
}

function showResult() {
  popupText.innerHTML = `🤖 Answer is: <b>${number}</b>`;
  popup.classList.add("show");
}

function getRank(a) {
  if (a === 1) return "Psychic 🔮";
  if (a === 2) return "Mind Reader 🧠";
  if (a === 3) return "Sharp Shooter 🎯";
  if (a === 4) return "Solid Player ⚡";
  if (a === 5) return "Calculated Guess 😎";
  if (a === 6) return "Lucky Escape 😅";
  return "Last-Chance Survivor 💀";
}

function showWin() {
  popupText.innerHTML = `🎉 You Won!<br><br><b>${getRank(attempts)}</b><br>Attempts: ${attempts}`;
  popup.classList.add("show");
}

function showLose() {
  popupText.innerHTML = `💀 Game Over<br><br>Number was: <b>${number}</b>`;
  popup.classList.add("show");
}

function closePopup() {
  popup.classList.remove("show");
}

function playAgain() {
  popup.classList.remove("show");
  resetGame();
}

function resetGame() {
  number = Math.floor(Math.random() * 99) + 1;
  input = "";
  attempts = 0;
  setMessage("New round started. Hunt the number 🔥");

  document.querySelectorAll(".box").forEach(b => {
    b.innerText = "";
    b.classList.remove("success", "fail");
  });

  document.querySelectorAll(".guess-box").forEach(b => {
    b.innerText = "";
    b.classList.remove("low", "high");
  });

  updateDisplay();
}

function launchConfetti() {
  const colors = ["#22d3ee", "#a855f7", "#ec4899", "#22c55e", "#facc15"];

  for (let i = 0; i < 42; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti";
    piece.style.left = Math.random() * 100 + "vw";
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 0.45 + "s";
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(piece);

    setTimeout(() => piece.remove(), 2300);
  }
}
</script>
</body>
</html>
